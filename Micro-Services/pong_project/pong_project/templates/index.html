{% load static %}
{% csrf_token %}

<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ft_transcendence</title>
	<link rel="stylesheet" href="{% static 'css/style.css' %}">
	<link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
	<link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
	<link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
	<link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
	<link rel="manifest" href="{% static 'site.webmanifest' %}">
</head>

<body>
	<main>
		<header>
			<h1>ft_transcendence</h1>
			<div id="notLoggedIn" style="display: none;">
				<button id="login-button" type="submit">Login</button>
				<button id="register-button" type="submit">Register</button>
			</div>
			<div id="loggedIn" style="display: none;">
				<p>Welcome, <span id="username"></span>!</p>
				<button id="logout-button" type="submit">Logout</button>
			</div>
			<div id="Registered" style="display: none;">
				<p>You've been registered, you can now loggin</p>
			</div>
		</header>
		<div id="Login" style="display: none;">
			<form id="loginForm">
				<label for="username_login">Username:</label>
				<input type="text" id="username_login" name="username" required>
				<label for="password_login">Password:</label>
				<input type="password" id="password_login" name="password" required>
				<button id="submit-login-button" type="submit">Login</button>
			</form>
		</div>
		<div id="Register" style="display: none;">
			<form id="registerForm">
				<label for="username_register">Username:</label>
				<input type="text" id="username_register" name="username" required>
				<label for="password1_register">Password:</label>
				<input type="password" id="password1_register" name="password1" required>
				<label for="password2_register">Confirm Password:</label>
				<input type="password" id="password2_register" name="password2" required>
				<button id="submit-register-button" type="submit">Register</button>
		</div>
		</form>
		<div id="game-menu-div" style="display: none;">
			<button id="local-button">Play Local Game</button>
			<button id="remote-button">Play Remote Game</button>
			<button id="ai-button">Play Against AI</button>
			<button id="tournament-button"> Tournament</button>
		</div>
		<div id="game-div" style="display: none;">
			<canvas id="game-canvas" width="480" height="650"></canvas>
		</div>
		<script> window.ASSETS_URL = "{% static '' %}" + "assets/"; </script>
		<script type="module" src="{% static 'js/pong/ai.js' %}"></script>
		<script type="module" src="{% static 'js/pong/game_manager.js' %}"></script>
		<script type="module" src="{% static 'js/pong/game.js' %}"></script>
		<script type="module" src="{% static 'js/pong/global.js' %}"></script>
		<script type="module" src="{% static 'js/pong/graphics.js' %}"></script>
		<script type="module" src='{% static "js/pong/input.js" %}'></script>
		<script type="module" src="{% static 'js/pong/physics.js' %}"></script>
		<script type="module" src="{% static 'js/pong/snapshot.js' %}"></script>
		<script type="module" src='{% static "js/pong/sound.js" %}'></script>
		<script type="module" src="{% static 'js/client.js' %}"></script>
		<script type="module" src="{% static 'js/main.js' %}"></script>
		<footer>

		</footer>
	</main>
</body>

</html>
