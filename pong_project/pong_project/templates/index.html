{% load static %}
{% csrf_token %}

<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pong</title>
	<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
	<main>
		<div id="auth-form-div">
			<input type="text" id="username" placeholder="Username">
			<input type="password" id="password" placeholder="Password">
			<button id="login-btn">Login</button>
			<button id="register-btn">Register</button>
		</div>

		<div id="game-launch-buttons">
			<button id="start-local-game-btn">Play Local Game</button>
			<button id="start-remote-game-btn">Play Remote Game</button>
			<button id="start-ai-game-btn">Play Against AI</button>
		</div>
		<canvas id="game-canvas" width="600" height="800"></canvas>
		<script src='{% static "js/auth.js" %}'></script>
		<script src='{% static "js/utils.js" %}'></script>
		<script src='{% static "js/game.js" %}'></script>
		<script src='{% static "js/inputs.js" %}'></script>
		<script src='{% static "js/events.js" %}'></script>
	</main>
</body>

</html>
