{% load static %}
{% csrf_token %}

<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ft_transcendence</title>
	<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
	<main>
		<h1>ft_transcendence</h1>
		<div id="alias-div">
			<input type="text" id="alias" placeholder="Alias">
			<button id="ok-button">OK</button>
		</div>
		<div id="game-menu-div">
			<button id="local-button">Play Local Game</button>
			<button id="remote-button">Play Remote Game</button>
			<button id="ai-button">Play Against AI</button>
			<button id="tournament-button"> Tournament</button>
		</div>
		<div id="game-div">
			<canvas id="game-canvas" width="480" height="650"></canvas>
		</div>
		<script type="module" src="{% static 'js/engine.js' %}"></script>
		<script type="module" src="{% static 'js/events.js' %}"></script>
		<script type="module" src="{% static 'js/game.js' %}"></script>
		<script type="module" src="{% static 'js/graphics.js' %}"></script>
		<script type="module" src="{% static 'js/physics.js' %}"></script>
		<script type="module" src='{% static "js/requests.js" %}'></script>
		<script type="module" src='{% static "js/sound.js" %}'></script>
		<script type="module" src='{% static "js/utils.js" %}'></script>
		<script type="module">
			import { start_loop } from '../static/js/engine.js';
			import { user_init, user_update, user_draw } from '../static/js/game.js';
			window.addEventListener('DOMContentLoaded', (event) => {
				start_loop(user_init, user_update, user_draw);
			});
		</script>
	</main>
</body>

</html>
