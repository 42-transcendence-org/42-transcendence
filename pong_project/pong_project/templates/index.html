{% load static %}
{% csrf_token %}

<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pong</title>
	<style>
		@font-face {
			font-family: 'Code Page 437';
			src: url('./assets/code-page-437.ttf') format('truetype');
		}

		body {
			font-family: 'Code Page 437';
			margin: 0;
			padding: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #2B2A4C;
		}

		main {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
		}

		h1 {
			color: #EEE2DE;
			margin: 20px 0;
			text-shadow: 5px 5px 0px #252442;
		}
	</style>
</head>

<body>
	<main>
		<h1>ft_transcendence</h1>
		<canvas id="game-canvas" width="480" height="650"></canvas>
		<script type="module" src='./game.js'></script>
		<script type="module" src='./graphics.js'></script>
		<script type="module" src='./engine.js'></script>
		<script type="module" src='./physics.js'></script>
		<script type="module" src='./sound.js'></script>
		<script type="module">
			import { start_loop } from './engine.js';
			import { user_init, user_update, user_draw } from './game.js';
			window.addEventListener('DOMContentLoaded', (event) => {
				start_loop(user_init, user_update, user_draw);
			});
		</script>
	</main>
</body>

</html>
