version: '3'

services:
  frontend:
    build:
      context: ./PONG/frontend/src
      dockerfile: Dockerfile
    environment:
      - HOST_IP=${HOST_IP}
    volumes:
      - ./PONG/frontend/src:/app
    ports:
      - "8001:8000"
    networks:
      - front
    depends_on:
      - frontend_db
    restart: on-failure

  frontend_db:
    image: postgres:16-bookworm
    volumes:
      - front_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: frontend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    networks:
      - front
    restart: on-failure

  authentification:
    build:
      context: ./PONG/authentification/src
      dockerfile: Dockerfile
    environment:
      - HOST_IP=${HOST_IP}
    volumes:
      - ./PONG/authentification/src:/app
    ports:
      - "8002:8000"
    networks:
      - auth
    depends_on:
      - authentification_db
    restart: on-failure


  authentification_db:
    image: postgres:16-bookworm
    volumes:
      - auth_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: authentification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    networks:
      - auth
    ports:
      - 5432
    restart: on-failure


  game:
    build:
      context: ./PONG/game
      dockerfile: Dockerfile
    volumes:
      - ./PONG/game:/app
    ports:
      - "8003:8000"
    networks:
      - game
    depends_on:
      - game_db
    restart: on-failure


  game_db:
    image: postgres:16-bookworm
    volumes:
      - game_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    networks:
      - game
    restart: on-failure

  bot:
    build:
      context: ./PONG/bot
      dockerfile: Dockerfile
    volumes:
      - ./PONG/bot:/app
    ports:
      - "8004:8000"
    networks:
      - bot
    depends_on:
      - bot_db
    restart: on-failure


  bot_db:
    image: postgres:16-bookworm
    volumes:
      - bot_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    networks:
      - bot
    restart: on-failure

  prometheus:
    build:
      context: ./PONG/DevOps/Prometheus
      dockerfile: Dockerfile
    environment:
      - HOST_IP=${HOST_IP}
    volumes:
      - ./PONG/DevOps/Prometheus/prometheus.template.yml:/etc/prometheus/prometheus.template.yml
    ports:
     - "9090:9090"
    networks:
    - front
    - auth
    restart: on-failure

  grafana:
    build:
      context: ./PONG/DevOps/Grafana
      dockerfile: Dockerfile
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./PONG/DevOps/Grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./PONG/DevOps/Grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./PONG/DevOps/Grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - HOST_IP=${HOST_IP}
      - GF_SECURITY_ADMIN_PASSWORD=yourpassword
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/config.json
    ports:
      - "3000:3000"
    networks:
    - front
    - auth
    restart: on-failure

  node_exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"
    volumes:
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/:/rootfs:ro"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points'
      - '^/(sys|proc|dev|host|etc)($$|/)'

volumes:
  front_db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: $FRNT_DB_VOL

  auth_db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: $AUTH_DB_VOL

  game_db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: $GAME_DB_VOL

  bot_db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: $BOT_DB_VOL

  grafana-storage:

  prometheus-storage:


networks:
  front:
    driver: bridge
  auth:
    driver: bridge
  game:
    driver: bridge
  bot:
    driver: bridge
