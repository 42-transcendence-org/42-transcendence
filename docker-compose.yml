version: '3'

services:
  frontend:
    build:
      context: ./PONG/frontend/src
      dockerfile: Dockerfile
    volumes:
      - ./PONG/frontend/src:/app
    networks:
      - front
    depends_on:
      - frontend_db
    restart: on-failure

  frontend_new:
    build:
      context: ./PONG/frontend_new/src
      dockerfile: Dockerfile
    volumes:
      - ./PONG/frontend_new/src:/usr/share/nginx/html
    networks:
      - front
    ports:
      - "8050:80"
    restart: on-failure

  nginx:
    build:
      context: ./PONG/frontend/nginx
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      - frontend
    networks:
      - front
    restart: on-failure

  frontend_db:
    image: postgres:16-bookworm
    volumes:
      - front_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: frontend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    networks:
      - front
    restart: on-failure

  authentification:
    build:
      context: ./PONG/authentification/src
      dockerfile: Dockerfile
    volumes:
      - ./PONG/authentification/src:/app
    ports:
      - "8002:8000"
    networks:
      - auth
    depends_on:
      - authentification_db
    restart: on-failure


  authentification_db:
    image: postgres:16-bookworm
    volumes:
      - auth_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: authentification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    networks:
      - auth
    ports:
      - 5432
    restart: on-failure


  game:
    build:
      context: ./PONG/game
      dockerfile: Dockerfile
    volumes:
      - ./PONG/game:/app
    ports:
      - "8003:8000"
    networks:
      - game
    depends_on:
      - game_db
    restart: on-failure


  game_db:
    image: postgres:16-bookworm
    volumes:
      - game_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    networks:
      - game
    restart: on-failure

  bot:
    build:
      context: ./PONG/bot
      dockerfile: Dockerfile
    volumes:
      - ./PONG/bot:/app
    ports:
      - "8004:8000"
    networks:
      - bot
    depends_on:
      - bot_db
    restart: on-failure


  bot_db:
    image: postgres:16-bookworm
    volumes:
      - bot_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    networks:
      - bot
    restart: on-failure

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
     - "9090:9090"
    networks:
    - front
    - auth
    restart: on-failure

  grafana:
    image: grafana/grafana
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=yourpassword
    ports:
      - "3000:3000"
    networks:
    - front
    - auth
    restart: on-failure

volumes:
  front_db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: $FRNT_DB_VOL

  auth_db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: $AUTH_DB_VOL

  game_db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: $GAME_DB_VOL

  bot_db:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: $BOT_DB_VOL

  grafana-storage:

  prometheus-storage:


networks:
  front:
    driver: bridge
  auth:
    driver: bridge
  game:
    driver: bridge
  bot:
    driver: bridge
