{% load static %}

<div class="login-form">
    <h1>Connection</h1>

    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}

    <form id="loginForm" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type = "submit" value = "Se connecter">
    </form>
</div>
